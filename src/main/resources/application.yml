server:
  port: ${PORT:8080}

spring:
  application:
    name: taskpay
  datasource:
    url: jdbc:h2:file:./data/taskpay-db;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  jackson:
    serialization:
      write-dates-as-timestamps: false

taskpay:
  cors:
    allowed-origins: ${TASKPAY_CORS_ORIGINS:http://localhost:8080,http://localhost:4173}
